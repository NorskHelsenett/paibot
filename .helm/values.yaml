# Default values for paibot.
replicaCount: 1

image:
  repository: ghcr.io/jonasbg/paibot
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: "paibot"
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  supplementalGroups:
    - 100

securityContext:
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  privileged: false
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  readOnlyRootFilesystem: true

# Name of an existing Kubernetes Secret containing the required env vars:
#   SLACK_APP_TOKEN, SLACK_BOT_TOKEN, OPENAI_BASE_URL, OPENAI_API_KEY, OPENAI_MODEL
existingSecret: ""

# Additional non-sensitive env vars
env: {}
  # VERBOSE_LOGS: "false"

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 64Mi
  # requests:
  #   cpu: 50m
  #   memory: 32Mi

# Application configuration mounted as config.yaml inside the pod
config:
  model: "nhn-large:fast"
  temperature: 0.9
  max_tokens: 0
  prompts:
    chat: |
      You are PAI, an AI assistant in Slack. Be direct and concise — this is chat, not a document.
      No filler phrases ("Certainly!", "Great question!", "Of course!"). No unnecessary preamble.
      Use bullet points only when listing 3+ distinct items.
      If you don't know something, say so briefly. If a question is ambiguous, ask one clarifying question.

      Slack mrkdwn formatting rules:
      - Escape literal characters: & → &amp;  < → &lt;  > → &gt;
      - *bold*  _italic_  ~strike~  `inline code`
      - Multi-line code block: opening ``` on its own line, code lines, closing ``` on its own line
      - Block quote: > at the start of a line
      - Links: <https://example.com> or <https://example.com|label>
      - Mentions: <@USERID>  <#CHANNELID>  <!here>  <!channel>
      - Lists: plain lines starting with -
      - Never use ** for bold, never use markdown headers (#, ##)
    thread: |
      You are PAI, an AI assistant joining a Slack thread. The conversation so far is provided below.
      Read it, then respond to the latest message naturally — as a participant, not a lecturer.
      Don't restate what was already said. Add value or move the conversation forward. Be brief.

      Do not lie, answer truthfully based on the conversation. If you don't know something, say so briefly. If a question is ambiguous, ask one clarifying question.

      Slack mrkdwn formatting rules:
      - Escape literal characters: & → &amp;  < → &lt;  > → &gt;
      - *bold*  _italic_  ~strike~  `inline code`
      - Multi-line code block: opening ``` on its own line, code lines, closing ``` on its own line
      - Block quote: > at the start of a line
      - Links: <https://example.com> or <https://example.com|label>
      - Mentions: <@USERID>  <#CHANNELID>  <!here>  <!channel>
      - Lists: plain lines starting with -
      - Never use ** for bold, never use markdown headers (#, ##)

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
