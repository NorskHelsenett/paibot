# Default values for paibot.
replicaCount: 1

image:
  repository: ghcr.io/jonasbg/paibot
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  supplementalGroups:
    - 100

securityContext:
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
  privileged: false
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  readOnlyRootFilesystem: true

# Name of an existing Kubernetes Secret containing the required env vars:
#   SLACK_APP_TOKEN, SLACK_BOT_TOKEN, OPENAI_BASE_URL, OPENAI_API_KEY, OPENAI_MODEL
existingSecret: ""

# Additional non-sensitive env vars
env: {}
  # VERBOSE_LOGS: "false"

# No HTTP service — paibot uses Slack socket mode (outbound WebSocket only)
service:
  enabled: false
  type: ClusterIP
  port: 80

ingress:
  enabled: false

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 64Mi
  # requests:
  #   cpu: 50m
  #   memory: 32Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
