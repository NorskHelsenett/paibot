display_information:
  name: paibot
  description: Din private AI agent
  background_color: "#000000"
  long_description: paibot er en intelligent AI-assistent integrert direkte i Slack. Svar på spørsmål, få hjelp med kode, tekst eller analyse – enten i kanaler via @paibot eller i en privat direktemelding med full samtalehistorikk.
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: PAI
    always_online: true
oauth_config:
  scopes:
    bot:
      - search:read.users
      - app_mentions:read
      - assistant:write
      - channels:history
      - channels:read
      - chat:write
      - chat:write.public
      - files:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - links:read
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users.profile:read
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - file_created
      - file_shared
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
